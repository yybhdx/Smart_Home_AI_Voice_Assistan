name: smart_home_flutter
description: 智能家居助手 - Graduation Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # UI
  flutter_screenutil: ^5.9.3
  cupertino_icons: ^1.0.8

  # HTTP Client
  dio: ^5.4.4

  # Local Storage
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^0.68.0

  # Time formatting
  intl: ^0.19.0

  # MQTT Communication
  mqtt_client: ^10.11.11

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Permission
  permission_handler: ^11.4.0

  # Connectivity
  connectivity_plus: ^6.1.2

  # Crypto for MQTT password
  crypto: ^3.0.6

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
